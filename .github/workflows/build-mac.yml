name: Build macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyQt6 openpyxl pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --windowed
          --onedir
          --name church_app
          --add-data "arrow_down.svg:."
          church_app.py

      - name: Copy database into bundle
        run: cp test_db.sqlite dist/church_app.app/Contents/MacOS/test_db.sqlite

      - name: Verify bundle contents
        run: ls -lh dist/church_app.app/Contents/MacOS/ | grep -E '\.(app|sqlite)$'

      - name: Zip app bundle
        run: zip -r church_app_mac.zip dist/church_app.app

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          body: |
            ## 보스톤 한인 천주교 교적 관리 시스템 — ${{ github.ref_name }}

            ### 📥 다운로드 안내

            | 파일 | 운영체제 |
            |------|----------|
            | `church_app_windows.zip` | Windows 10 / 11 |
            | `church_app_mac.zip` | macOS 12 이상 |

            ### 🖥 Windows 설치 방법
            1. `church_app_windows.zip`을 다운로드하여 압축 해제합니다.
            2. `church_app` 폴더 안의 `church_app.exe`를 더블클릭하여 실행합니다.
            > Windows SmartScreen 경고가 뜨면 "추가 정보" → "실행"을 클릭하세요.

            ### 🍎 macOS 설치 방법
            1. `church_app_mac.zip`을 다운로드하여 압축 해제합니다.
            2. `church_app.app`을 더블클릭하여 실행합니다.

            ### ℹ️ 참고사항
            - 데이터베이스 파일(`test_db.sqlite`)이 번들에 포함되어 있습니다.
            - 업데이트 시 새 버전의 실행 파일로 교체하세요. 데이터베이스는 유지됩니다.
          files: church_app_mac.zip
